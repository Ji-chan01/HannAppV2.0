<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>

    <link rel="icon" href="./assets/images/logo/Untitled103_20250103201128.png">

    <link rel="stylesheet" href="./assets/styles/general.css">
    <link rel="stylesheet" href="./assets/styles/settings.css">
</head>
<body>
    <main class="main-container">
        <header>
            <h1>Account Settings</h1>
        </header>
        <section class="option-section">
            <h1>Select your options</h1>
            <section class="sub-container">
                <div class="option-container">
                    <ul class="ul-links">
                        <li><a class="ul-link" href="#">Name</a></li>
                        <li><a class="ul-link" href="#">Username</a></li>
                        <li><a class="ul-link" href="#">Password</a></li>
                    </ul>
                </div>
                <section class="option">
                    <div class="name">
                        <input id="f_name" type="text" placeholder="First Name">
                        <input id="l_name" type="text" placeholder="Last Name">
                        <input id="pword" type="password" placeholder="Confirm Password">
                    </div>
                    <div class="username">
                        <input id="u_name" type="text" placeholder="Username">
                        <input id="pword2" type="password" placeholder="Confirm Password">
                    </div>
                    <div class="password">
                        <input id="u_name" type="text" placeholder="Password">
                        <input id="u_name" type="text" placeholder="Password">
                        <input id="pword2" type="password" placeholder="Confirm Password">
                    </div>
                </section>
            </section>
        </section>
    </main>
</body>
</html>
